<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A2</title>
    <style>
      * {
        transition: 0.25s;
      }
      body {
        display: grid;
        place-items: center;
        height: 100vh;
        width: 100vw;
        background-color: lightyellow;
        margin: 0;
      }
      button {
        background-color: gold;
        padding-inline: 40px;
        border-radius: 15px;
        border: 2px solid black;
        padding-block: 20px;
        font-size: 2rem;
        box-shadow: 20px 20px 0 0px black;
        &:active {
          translate: 20px 20px;
          box-shadow: 0px 0px 0 0px black;
        }
      }
    </style>
  </head>
  <body>
    <button>Press this</button>
  </body>
</html>
