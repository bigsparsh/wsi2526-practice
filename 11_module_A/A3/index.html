<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A3</title>
    <style>
      * {
        transition: 0.25s;
      }
      body {
        display: grid;
        place-items: center;
        height: 100vh;
        width: 100vw;
        margin: 0;
      }
      a {
        font-family: sans-serif;
        font-size: 2em;
        color: black;
        text-decoration: none;
        position: relative;
        z-index: 1;

        .high {
          position: absolute;
          height: 0%;
          width: 0%;
          bottom: 0;
          z-index: -1;
          left: 0;
          background-color: gold;
        }

        &:active {
          color: white;
        }

        &:active .high {
          height: 100% !important;
          width: 100%;
        }

        &:hover .high {
          height: 10%;
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <a href="#">
      <div class="high"></div>
      Link para...</a
    >
  </body>
</html>
